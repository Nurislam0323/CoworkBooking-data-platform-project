name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-and-quality:
    name: Tests and data quality
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest -q tests

      - name: Run data quality checks
        run: python scripts/run_data_quality.py

      - name: Compile core Python files
        run: |
          python -m py_compile scripts/local_full_demo.py
          python -m py_compile scripts/run_data_quality.py
          python -m py_compile lakehouse/spark/lib/transformations.py
          python -m py_compile tests/test_transformations.py
