stages:
  - test
  - data_quality
  - build
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

pytest:
  image: python:3.11
  stage: test
  script:
    - pip install pandas pytest
    - pytest -q tests

great_expectations:
  image: python:3.11
  stage: data_quality
  script:
    - pip install great-expectations pandas pyarrow
    - python scripts/run_data_quality.py

build_airflow:
  image: docker:27
  services: [docker:27-dind]
  stage: build
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/airflow:$CI_COMMIT_SHA" orchestration/airflow
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker push "$CI_REGISTRY_IMAGE/airflow:$CI_COMMIT_SHA"

build_cube:
  image: docker:27
  services: [docker:27-dind]
  stage: build
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/cube:$CI_COMMIT_SHA" semantic/cube
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker push "$CI_REGISTRY_IMAGE/cube:$CI_COMMIT_SHA"

deploy_test:
  image: alpine:3.21
  stage: deploy
  needs: [build_airflow, build_cube, great_expectations, pytest]
  before_script:
    - apk add --no-cache openssh-client bash
    - eval "$(ssh-agent -s)"
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
  script:
    - bash scripts/deploy_test_stand.sh
  environment:
    name: test
  only:
    - main
