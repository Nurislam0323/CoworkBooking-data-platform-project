services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio-data:/data]

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 $${AWS_ACCESS_KEY_ID:-minioadmin} $${AWS_SECRET_ACCESS_KEY:-minioadmin};
          mc mb --ignore-existing local/$${S3_BUCKET:-coworkbooking-lakehouse};
          mc anonymous set download local/$${S3_BUCKET:-coworkbooking-lakehouse};"

  kafka:
    image: bitnami/kafka:3.8
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports: ["29092:29092"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes: [postgres-data:/var/lib/postgresql/data]

  airflow-init:
    build: ./orchestration/airflow
    depends_on: [postgres, minio-init]
    environment: &airflow-env
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-coworkbooking-lakehouse}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Data --lastname Platform --role Admin --email admin@coworkbooking.local || true"

  airflow-webserver:
    build: ./orchestration/airflow
    depends_on: [airflow-init]
    environment: *airflow-env
    command: airflow webserver
    ports: ["8080:8080"]
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./great_expectations:/opt/airflow/great_expectations

  airflow-scheduler:
    build: ./orchestration/airflow
    depends_on: [airflow-init]
    environment: *airflow-env
    command: airflow scheduler
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./great_expectations:/opt/airflow/great_expectations

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    ports: ["8123:8123", "9009:9000"]
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./streaming/clickhouse/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  grafana:
    image: grafana/grafana:11.5.2
    depends_on: [clickhouse]
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    ports: ["3000:3000"]
    volumes:
      - ./streaming/grafana/provisioning:/etc/grafana/provisioning

  cube:
    build: ./semantic/cube
    depends_on: [clickhouse]
    environment:
      CUBEJS_DB_TYPE: ${CUBEJS_DB_TYPE:-clickhouse}
      CUBEJS_DB_HOST: ${CUBEJS_DB_HOST:-clickhouse}
      CUBEJS_DB_PORT: ${CUBEJS_DB_PORT:-8123}
      CUBEJS_DB_NAME: ${CUBEJS_DB_NAME:-coworkbooking}
      CUBEJS_DB_USER: ${CUBEJS_DB_USER:-default}
      CUBEJS_DB_PASS: ${CUBEJS_DB_PASS:-}
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:-dev_secret}
      CUBEJS_DEV_MODE: "true"
    ports: ["4000:4000"]

  api:
    build: ./services/lms_api
    ports: ["5000:5000"]

  semantic-web:
    build: ./semantic/web
    depends_on: [cube]
    environment:
      VITE_CUBE_API_URL: http://localhost:4000/cubejs-api/v1
      VITE_CUBE_TOKEN: dev_secret
    ports: ["5173:80"]

volumes:
  minio-data:
  postgres-data:
  clickhouse-data:
